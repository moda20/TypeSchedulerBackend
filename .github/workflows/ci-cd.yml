name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v3

      # Log in to GitHub Container Registry (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          GIT_SHA=${{ github.sha }}
          echo "APP_VERSION=$VERSION-$GIT_SHA" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./DOCKERFILE
          push: true
          build-args: |
            SYSTEM_VERSION_STRING=${{ env.APP_VERSION }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/type_scheduler_backend:latest
            ghcr.io/${{ github.repository_owner }}/type_scheduler_backend:${{ github.sha }}
          platforms: linux/amd64,linux/arm64
